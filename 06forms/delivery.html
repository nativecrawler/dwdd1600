        <h1>WasatchNative</h1>
        <h2>Requesting a recruit in any interest</h2>
        <p class="fielder">Those in Digital, Physical, Engineering of any kind in Arts</p>
<br>
<br>
         <form method="get" action="thanks.html" class="myform">

            <fieldset>
                <legend>Field Information</legend>
            <label>First Name: <input type="text" name="firstname" required></label>
            <label>Last Name: <input type="text" name="lastname" required></label>
            <label>Cell Number: <input type="tel" name="phone" required placeholder="789-123-4567"></label>
        </fieldset>
        <fieldset>
            <legend>Process Method</legend>
            <label><input type="radio" value="drone" name="method" >Flight Delivery (1-3 days)</label>
            <label><input type="radio" value="van" name="method" >Van Delivery (local - 2 hours)</label>
            <label><input type="radio" value="parcel" name="method" >Parcel Delivery (2-3 days)</label>
        </fieldset>
        <fieldset>
            <legend>Process Options</legend>
            <label><input type="checkbox" name="frontentrance" value="frontentrance">Front Entrance</label>
            <label><input type="checkbox" name="dock" value="dock">Dock</label>
            <label><input type="checkbox" name="pathway" value="pathway">Pathway</label>
            <label><input type="checkbox" name="officedesk" value="officedesk">Office Desk</label><br>



                <label>Preferred Process Duration
                    <select name="Duration">
                        <option value="none">Please Choose Duration</option>
                        <option value="morning">Between 9:30 and 11:00am</option>
                        <option value="noon">Between 12:00 & 1:30pm</option>
                        <option value="afternoon">Between 1:30pm & 3:30pm</option>
                        <option value="evening">Between 4:00 & 5:00pm</option>
                    </select>
                </label>
        </fieldset>

        <label>Comments:
            <textarea name="comments"></textarea>
        </label>

        <input type="submit" value="Send Comfirmation">
